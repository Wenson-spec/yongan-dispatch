server {
    listen 3001;
    server_name _;
    client_max_body_size 50M;
    root /var/www/yongan_test/dist/public;
    index index.html;

    # API 请求反向代理到 3000 端口后端
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # tRPC 请求也代理到 3000 后端
    location /trpc/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # /ltl/ 路径：先找静态文件，找不到则回退到 ltl/index.html（SPA）
    location = /ltl/index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        root /var/www/yongan_test/dist/public;
        try_files /ltl/index.html =404;
    }
    location /ltl/ {
        try_files $uri $uri/ /ltl/index.html;
    }

    # /station/ 路径：SPA fallback，使用本地 index.html（不再代理到 3000）
    location /station/ {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源优先从本地 yongan_test 目录提供
    # 如果本地没有，则代理到 3000
    location /assets/ {
        try_files $uri @proxy_assets;
        expires 1y;
        add_header Cache-Control "no-cache";
    }

    location @proxy_assets {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
    }

    # 其他静态资源（woff2、图片等）长期缓存
    location ~* \.(css|woff2?|ttf|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # 根路径及其他路径：先找文件，再找目录，最后回退 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
